<!DOCTYPE html>
<html lang="ja">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BZ3JD1DY4V"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-BZ3JD1DY4V');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHV & Adult Height Predictor Pro</title>
    <style>
        :root { --phase1: #e1f5fe; --phase2: #bbdefb; --phase3: #90caf9; --phase4: #42a5f5; --accent: #1a73e8; --range-color: #f57f17; }
        body { font-family: sans-serif; margin: 0; padding: 15px; background: #f0f2f5; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header-box { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); margin-bottom: 20px; padding-bottom: 8px; }
        h1 { color: var(--accent); font-size: 1.2rem; margin: 0; }
        #lang-selector { padding: 5px; border-radius: 5px; border: 1px solid #ccc; font-size: 0.8rem; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        label { font-size: 0.8rem; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .full-width { grid-column: span 2; }
        .section-title { grid-column: span 2; font-size: 0.85rem; color: var(--accent); margin-top: 10px; border-left: 3px solid var(--accent); padding-left: 8px; }
        button { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #result-area { display: none; margin-top: 25px; }
        .score-card { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .score-box { background: #f8f9fa; padding: 15px; border-radius: 10px; text-align: center; border-top: 4px solid var(--accent); }
        .score-label { font-size: 0.75rem; font-weight: bold; color: #666; }
        .score-val { font-size: 1.4rem; font-weight: bold; color: var(--accent); }
        .score-unit { font-size: 0.8rem; margin-left: 2px; }
        .height-range-box { grid-column: span 2; background: #fffde7; border-top: 4px solid #fbc02d; padding: 15px; border-radius: 10px; text-align: center; }
        .range-grid { display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 5px; align-items: center; margin-top: 10px; }
        .range-item { font-size: 0.8rem; color: #666; }
        .range-val { font-size: 1.1rem; font-weight: bold; color: #555; }
        .range-val.main { font-size: 2rem; color: var(--range-color); }
        .nutrition-box { grid-column: span 2; background: #f1f8e9; border-top: 4px solid #7cb342; padding: 15px; border-radius: 10px; text-align: center; margin-top: 10px; }
        .nutri-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .nutri-val { font-size: 1.3rem; font-weight: bold; color: #33691e; }
        .chart-container { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 15px; margin: 15px 0; position: relative; }
        canvas { width: 100%; height: auto; display: block; }
        .advice-panel { padding: 18px; border-radius: 10px; margin-top: 15px; border-left: 6px solid #1557b0; }
        .notes { font-size: 0.7rem; color: #777; margin-top: 20px; padding: 10px; background: #eee; border-radius: 5px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h1 id="ui-title">PHV & Adult Height Predictor</h1>
        <select id="lang-selector" onchange="updateLanguage()">
            <option value="ja">日本語</option>
            <option value="en">English</option>
            <option value="zh">简体中文</option>
            <option value="es">Español</option>
        </select>
    </div>

    <div class="input-grid">
        <div class="section-title" id="ui-basic-info">基本情報</div>
        <div><label id="ui-gender">性別</label><select id="gender"><option value="male">Male / 男子</option><option value="female">Female / 女子</option></select></div>
        <div><label id="ui-h">身長 (cm)</label><input type="number" id="height" step="0.1"></div>
        <div><label id="ui-w">体重 (kg)</label><input type="number" id="weight" step="0.1"></div>
        <div><label id="ui-sh">座高 (cm)</label><input type="number" id="sittingHeight" step="0.1"></div>
        
        <div class="section-title" id="ui-parents-info">両親の身長 (遺伝要因)</div>
        <div><label id="ui-fh">父親の身長 (cm)</label><input type="number" id="fHeight" step="0.1"></div>
        <div><label id="ui-mh">母親の身長 (cm)</label><input type="number" id="mHeight" step="0.1"></div>

        <div class="section-title" id="ui-date-info">日付情報</div>
        <div class="full-width"><label id="ui-birth">生年月日</label><input type="date" id="birthDate"></div>
        <div class="full-width"><label id="ui-test">計測日</label><input type="date" id="testDate"></div>
    </div>
    <button onclick="calculate()" id="ui-btn">分析を開始 / Analyze</button>

    <div id="result-area">
        <div class="score-card">
            <div class="score-box"><div class="score-label" id="ui-curr-age">現在の年齢</div><div><span class="score-val" id="res-age">--</span><span id="ui-unit-age">歳</span></div></div>
            <div class="score-box"><div class="score-label" id="ui-mat-type">成熟タイプ</div><div><span class="score-val" id="res-type" style="color:#e91e63;">--</span></div></div>
            
            <div class="height-range-box">
                <div class="score-label" id="ui-pred-range">予測最終身長の範囲 (足立式)</div>
                <div class="range-grid">
                    <div class="range-item"><span id="ui-min">最小</span><br><span class="range-val" id="res-min-h">--</span>cm</div>
                    <div class="range-item"><span id="ui-mid">中間値</span><br><span class="range-val main" id="res-target-h">--</span>cm</div>
                    <div class="range-item"><span id="ui-max">最大</span><br><span class="range-val" id="res-max-h">--</span>cm</div>
                </div>
            </div>

            <div class="nutrition-box">
                <div class="score-label" id="ui-nutri-title">アスリート向け栄養指標 (目安)</div>
                <div class="nutri-grid">
                    <div><div class="score-label" id="ui-kcal">推定必要エネルギー</div><span class="nutri-val" id="res-kcal">--</span><span class="score-unit">kcal/d</span></div>
                    <div><div class="score-label" id="ui-prot">目標タンパク質量</div><span class="nutri-val" id="res-protein">--</span><span class="score-unit">g/d</span></div>
                </div>
            </div>

            <div class="score-box" style="grid-column: span 2;">
                <div class="score-label" id="ui-phv-title">PHV年齢 ＆ 成熟度</div>
                <div class="score-val" id="res-phv-age">--</div>
                <div id="res-ym" style="font-size:1.1rem; font-weight:bold; color:#d32f2f; margin-top:8px;">--</div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="velocityChart" width="500" height="250"></canvas>
        </div>

        <div id="advice-panel" class="advice-panel">
            <div id="phase-label" style="font-weight:bold; color:#1557b0; font-size:1.2rem;"></div>
            <div id="advice-text" style="font-size:0.9rem; white-space:pre-wrap; margin-top:10px; line-height:1.6;"></div>
        </div>
        <div class="notes" id="logic-note"></div>
    </div>
</div>

<script>
const labels = {
    ja: {
        title: "PHV & 成人身長予測 (AWAKE)", basic: "基本情報", gender: "性別", h: "身長 (cm)", w: "体重 (kg)", sh: "座高 (cm)",
        parents: "両親の身長 (遺伝要因)", fh: "父親の身長 (cm)", mh: "母親の身長 (cm)", dates: "日付情報", birth: "生年月日", test: "計測日",
        btn: "分析を開始", cage: "現在の年齢", uage: "歳", mtype: "成熟タイプ", prange: "予測最終身長の範囲 (足立式)", min: "最小", mid: "中間値", max: "最大",
        nutri: "アスリート向け栄養指標 (目安)", kcal: "推定必要エネルギー", prot: "目標タンパク質量", phv: "PHV年齢 ＆ 成熟度",
        alert: "必須項目をすべて入力してください。", before: "ピークまで あと {n} 年", after: "ピークから {n} 年経過",
        early: "早熟型", normal: "標準型", late: "晩成型",
        f1: ["F1: 動作習得期", "様々な動きを経験しましょう。"],
        f2: ["F2: 準備期", "自重での体幹・動作トレーニングを開始。"],
        f3: ["F3: ピーク期", "急激な成長期。柔軟性低下に注意し、低負荷の補強を。"],
        f4: ["F4: 強化期", "骨格が安定。本格的な筋力強化が可能です。"],
        note: "【根拠】男子:中馬(2022) / 女子:Moore(2015) / 身長:足立式 / 栄養:日本人の食事摂取基準"
    },
    en: {
        title: "PHV & Height Predictor Pro", basic: "Basic Info", gender: "Gender", h: "Height (cm)", w: "Weight (kg)", sh: "Sitting Height (cm)",
        parents: "Parental Height", fh: "Father's Height (cm)", mh: "Mother's Height (cm)", dates: "Dates", birth: "Date of Birth", test: "Test Date",
        btn: "Start Analysis", cage: "Current Age", uage: "y/o", mtype: "Maturity Type", prange: "Predicted Adult Height (Adachi)", min: "Min", mid: "Target", max: "Max",
        nutri: "Nutritional Targets (Athlete)", kcal: "Est. Energy Needs", prot: "Target Protein", phv: "PHV Age & Maturity",
        alert: "Please fill in all required fields.", before: "{n} years until peak", after: "{n} years post-peak",
        early: "Early", normal: "Average", late: "Late",
        f1: ["F1: Skill Acquisition", "Focus on diverse movement patterns."],
        f2: ["F2: Preparation", "Start core and bodyweight training."],
        f3: ["F3: Peak Growth", "Rapid growth. Prioritize flexibility and low-load exercises."],
        f4: ["F4: Strengthening", "Stable skeleton. Full strength training is possible."],
        note: "Ref: Male:Chuma(2022) / Female:Moore(2015) / Height:Adachi / Nutrition:Dietary Reference Intakes"
    },
    zh: {
        title: "PHV & 成年身高预测 Pro", basic: "基本信息", gender: "性别", h: "身高 (cm)", w: "体重 (kg)", sh: "坐高 (cm)",
        parents: "父母身高", fh: "父亲身高 (cm)", mh: "母亲身高 (cm)", dates: "日期信息", birth: "出生日期", test: "测量日期",
        btn: "开始分析", cage: "当前年龄", uage: "岁", mtype: "发育类型", prange: "预测成年身高 (足立式)", min: "最小值", mid: "中间值", max: "最大值",
        nutri: "运动员营养指标 (估算)", kcal: "估计所需能量", prot: "目标蛋白质", phv: "PHV 年龄 & 成熟度",
        alert: "请填写所有必填项。", before: "距离高峰还有 {n} 年", after: "高峰已过 {n} 年",
        early: "早熟型", normal: "标准型", late: "晚熟型",
        f1: ["F1: 动作学习期", "体验各种不同的运动动作。"],
        f2: ["F2: 准备期", "开始进行自重核心和动作训练。"],
        f3: ["F3: 高峰期", "生长突增期。注意柔韧性，进行低负荷训练。"],
        f4: ["F4: 强化期", "骨骼发育稳定。可以进行正式的力量训练。"],
        note: "依据: 男:中马(2022) / 女:Moore(2015) / 身高:足立式 / 营养:膳食营养素参考摄入量"
    },
    es: {
        title: "Predicción de PHV y Altura Pro", basic: "Datos Básicos", gender: "Género", h: "Altura (cm)", w: "Peso (kg)", sh: "Alt. Sentado (cm)",
        parents: "Altura de los Padres", fh: "Altura Padre (cm)", mh: "Altura Madre (cm)", dates: "Fechas", birth: "Fecha Nacimiento", test: "Fecha Medición",
        btn: "Analizar", cage: "Edad Actual", uage: "años", mtype: "Tipo de Madurez", prange: "Altura Final (Adachi)", min: "Mín", mid: "Media", max: "Máx",
        nutri: "Nutrición para Atletas", kcal: "Energía Est.", prot: "Proteína Obj.", phv: "Edad PHV y Madurez",
        alert: "Por favor, complete todos los campos.", before: "{n} años para el pico", after: "{n} años tras el pico",
        early: "Temprano", normal: "Normal", late: "Tardío",
        f1: ["F1: Adquisición", "Experimentar diversos movimientos."],
        f2: ["F2: Preparación", "Iniciar entrenamiento de core con peso corporal."],
        f3: ["F3: Pico de Crecimiento", "Crecimiento rápido. Cuidar flexibilidad y cargas bajas."],
        f4: ["F4: Fortalecimiento", "Esqueleto estable. Entrenamiento de fuerza completo."],
        note: "Ref: Masc:Chuma(2022) / Fem:Moore(2015) / Altura:Adachi / Nutrición:Ingestas de Referencia"
    }
};

window.onload = function() {
    document.getElementById('testDate').value = new Date().toISOString().split('T')[0];
    const userLang = navigator.language.substring(0, 2);
    if(labels[userLang]) document.getElementById('lang-selector').value = userLang;
    updateLanguage();
};

function updateLanguage() {
    const l = labels[document.getElementById('lang-selector').value];
    document.getElementById('ui-title').innerText = l.title;
    document.getElementById('ui-basic-info').innerText = l.basic;
    document.getElementById('ui-gender').innerText = l.gender;
    document.getElementById('ui-h').innerText = l.h;
    document.getElementById('ui-w').innerText = l.w;
    document.getElementById('ui-sh').innerText = l.sh;
    document.getElementById('ui-parents-info').innerText = l.parents;
    document.getElementById('ui-fh').innerText = l.fh;
    document.getElementById('ui-mh').innerText = l.mh;
    document.getElementById('ui-date-info').innerText = l.dates;
    document.getElementById('ui-birth').innerText = l.birth;
    document.getElementById('ui-test').innerText = l.test;
    document.getElementById('ui-btn').innerText = l.btn;
    document.getElementById('ui-curr-age').innerText = l.cage;
    document.getElementById('ui-unit-age').innerText = l.uage;
    document.getElementById('ui-mat-type').innerText = l.mtype;
    document.getElementById('ui-pred-range').innerText = l.prange;
    document.getElementById('ui-min').innerText = l.min;
    document.getElementById('ui-mid').innerText = l.mid;
    document.getElementById('ui-max').innerText = l.max;
    document.getElementById('ui-nutri-title').innerText = l.nutri;
    document.getElementById('ui-kcal').innerText = l.kcal;
    document.getElementById('ui-prot').innerText = l.prot;
    document.getElementById('ui-phv-title').innerText = l.phv;
}

function calculate() {
    const lang = document.getElementById('lang-selector').value;
    const l = labels[lang];
    const gender = document.getElementById('gender').value;
    const h = parseFloat(document.getElementById('height').value);
    const w = parseFloat(document.getElementById('weight').value);
    const sh = parseFloat(document.getElementById('sittingHeight').value);
    const fh = parseFloat(document.getElementById('fHeight').value);
    const mh = parseFloat(document.getElementById('mHeight').value);
    const bVal = document.getElementById('birthDate').value;
    const tVal = document.getElementById('testDate').value;
    
    if (!h || !w || !sh || !bVal || !tVal) { alert(l.alert); return; }

    const age = (new Date(tVal) - new Date(bVal)) / (1000*60*60*24*365.25);
    let offset = (gender === 'male') ? age - 13.87 : -7.709133 + (0.0042232 * (age * h));
    const phvAge = age - offset;

    let typeStr = "";
    if(gender === 'male') {
        typeStr = phvAge < 12.5 ? l.early : phvAge > 14.5 ? l.late : l.normal;
    } else {
        typeStr = phvAge < 10.5 ? l.early : phvAge > 12.5 ? l.late : l.normal;
    }

    if(fh && mh) {
        const baseT = (gender==='male' ? (fh+mh+13)/2 : (fh+mh-13)/2) + 2.0;
        document.getElementById('res-target-h').innerText = baseT.toFixed(1);
        document.getElementById('res-min-h').innerText = (baseT - 8).toFixed(1);
        document.getElementById('res-max-h').innerText = (baseT + 8).toFixed(1);
    }

    const kcal = Math.round((w * 30 + 500) * 1.8); 
    document.getElementById('res-kcal').innerText = kcal.toLocaleString();
    document.getElementById('res-protein').innerText = Math.round(w * 2.0);
    document.getElementById('res-age').innerText = age.toFixed(2);
    document.getElementById('res-phv-age').innerText = `${phvAge.toFixed(2)} ${l.uage}`;
    document.getElementById('res-type').innerText = typeStr;
    
    const ymText = offset < 0 ? l.before.replace('{n}', Math.abs(offset).toFixed(1)) : l.after.replace('{n}', offset.toFixed(1));
    document.getElementById('res-ym').innerText = ymText;
    document.getElementById('logic-note').innerHTML = l.note;
    document.getElementById('result-area').style.display = 'block';
    
    drawChart(offset);
    setAdvice(offset, l);
}

function drawChart(currentOffset) {
    const canvas = document.getElementById('velocityChart');
    const ctx = canvas.getContext('2d');
    const cw = canvas.width, ch = canvas.height, padding = 40;
    ctx.clearRect(0, 0, cw, ch);
    const getX = (o) => padding + ((o + 5) / 10) * (cw - padding * 2);
    const phases = [{s:-5, e:-2.5, c:'#e1f5fe', l:'F1'}, {s:-2.5, e:-1, c:'#bbdefb', l:'F2'}, {s:-1, e:1, c:'#90caf9', l:'F3'}, {s:1, e:3.5, c:'#42a5f5', l:'F4'}];
    phases.forEach(p => {
        ctx.fillStyle = p.c;
        ctx.fillRect(getX(p.s), padding, getX(p.e)-getX(p.s), ch-padding*2);
        ctx.fillStyle='#555'; ctx.fillText(p.l, getX(p.s)+5, padding+15);
    });
    ctx.beginPath(); ctx.strokeStyle = '#1a73e8'; ctx.lineWidth = 3;
    for (let i=0; i<=100; i++) {
        let xVal = -5 + (i/100)*10, xPos = getX(xVal);
        let yPos = (ch-padding) - (Math.exp(-Math.pow(xVal,2)/5) * (ch-padding*2) * 0.8);
        i===0 ? ctx.moveTo(xPos, yPos) : ctx.lineTo(xPos, yPos);
    }
    ctx.stroke();
    ctx.beginPath(); ctx.fillStyle='#ff1744'; ctx.arc(getX(currentOffset), (ch-padding)-(Math.exp(-Math.pow(currentOffset,2)/5)*(ch-padding*2)*0.8), 8, 0, 7); ctx.fill();
}

function setAdvice(offset, l) {
    let p="", a="", c="";
    if(offset < -2.5){ p=l.f1[0]; a=l.f1[1]; c="#e1f5fe"; }
    else if(offset < -1.0){ p=l.f2[0]; a=l.f2[1]; c="#bbdefb"; }
    else if(offset < 1.0){ p=l.f3[0]; a=l.f3[1]; c="#90caf9"; }
    else { p=l.f4[0]; a=l.f4[1]; c="#42a5f5"; }
    document.getElementById('advice-panel').style.background = c;
    document.getElementById('phase-label').innerText = p;
    document.getElementById('advice-text').innerText = a;
}
</script>
</body>
</html>
